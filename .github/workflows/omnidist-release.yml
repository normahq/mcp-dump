name: omnidist-release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.30'
      - name: Build artifacts
        run: omnidist --profile 'mcp-dump' build
      - name: Stage artifacts
        run: omnidist --profile 'mcp-dump' npm stage
      - name: Verify artifacts
        run: omnidist --profile 'mcp-dump' npm verify
      - name: Package GitHub release assets
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p .omnidist/mcp-dump/release
          tar -czf ".omnidist/mcp-dump/release/mcp-dump_${version}_darwin_amd64.tar.gz" -C .omnidist/mcp-dump/dist/darwin/amd64 mcp-dump
          tar -czf ".omnidist/mcp-dump/release/mcp-dump_${version}_darwin_arm64.tar.gz" -C .omnidist/mcp-dump/dist/darwin/arm64 mcp-dump
          tar -czf ".omnidist/mcp-dump/release/mcp-dump_${version}_linux_amd64.tar.gz" -C .omnidist/mcp-dump/dist/linux/amd64 mcp-dump
          tar -czf ".omnidist/mcp-dump/release/mcp-dump_${version}_linux_arm64.tar.gz" -C .omnidist/mcp-dump/dist/linux/arm64 mcp-dump
          tar -czf ".omnidist/mcp-dump/release/mcp-dump_${version}_windows_amd64.tar.gz" -C .omnidist/mcp-dump/dist/windows/amd64 mcp-dump.exe
      - name: Pack staged artifacts
        run: tar -czf omnidist-staged.tgz .omnidist/mcp-dump
      - name: Upload staged artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: omnidist-staged
          path: omnidist-staged.tgz
      - name: Upload GitHub release assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: github-release-assets
          path: .omnidist/mcp-dump/release/*
          if-no-files-found: error
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: .omnidist/mcp-dump/dist/**/*
          if-no-files-found: error

  publish_github_release:
    needs: prepare
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Download GitHub release assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: github-release-assets
          path: github-release-assets
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists; skipping create."
          else
            gh release create "${GITHUB_REF_NAME}" github-release-assets/* --verify-tag --generate-notes
          fi

  publish_npm:
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      NPM_PACKAGE: '@normahq/mcp-dump'
      NPM_VERSION: '0.0.7'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.30'
      - name: Download staged artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: omnidist-staged
      - name: Restore staged artifacts
        run: tar -xzf omnidist-staged.tgz
      - name: Verify artifacts
        run: omnidist --profile 'mcp-dump' npm verify
      - name: Publish npm artifacts
        run: |
          if npm view "${NPM_PACKAGE}@${NPM_VERSION}" version >/dev/null 2>&1; then
            echo "${NPM_PACKAGE}@${NPM_VERSION} already exists; skipping publish."
          else
            omnidist --profile 'mcp-dump' npm publish
          fi

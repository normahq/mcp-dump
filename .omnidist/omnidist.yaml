profiles:
  mcp-dump:
    tool:
      name: mcp-dump
      main: ./cmd/mcp-dump
    readme-path: ./README.md
    version:
      source: fixed
      fixed: 0.0.4
    targets:
      - os: darwin
        arch: amd64
      - os: darwin
        arch: arm64
      - os: linux
        arch: amd64
      - os: linux
        arch: arm64
      - os: windows
        arch: amd64
    build:
      ldflags: -s -w
      tags: []
      cgo: false
    distributions:
      npm:
        package: '@normahq/mcp-dump'
        registry: https://registry.npmjs.org
        access: public
        publish-auth: trusted
        repository-url: git+https://github.com/normahq/mcp-dump.git
        license: MIT
        include-readme: true
        keywords:
          - ai
          - llm
          - mcp
          - agent
          - cli
          - dump

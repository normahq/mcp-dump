version: '3'

vars:
  BINARY_NAME: mcp-dump
  MAIN_PATH: ./cmd/mcp-dump
  OUTPUT_DIR: bin

tasks:
  default:
    desc: Build mcp-dump binary
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}
      - go build -o {{.OUTPUT_DIR}}/{{.BINARY_NAME}} {{.MAIN_PATH}}

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - go tool golangci-lint run ./...
